server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/superchat}
    username: ${SPRING_DATASOURCE_USERNAME:superchat}
    password: ${SPRING_DATASOURCE_PASSWORD:superchat123}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:ChangeThisSecretToAtLeast32CharsLong12345}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

springdoc:
  api-docs:
    path: /auth/v3/api-docs
  swagger-ui:
    path: /auth/docs
