server:
  port: ${SERVER_PORT:8888}

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
