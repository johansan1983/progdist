spring:
  application:
    name: moderation-service
  config:
    import: "optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}"
  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 5000
        multiplier: 1.5
  datasource:
    url: ${SPRING_DATASOURCE_MODERATION_URL:jdbc:postgresql://localhost:5432/moderation}
    username: ${SPRING_DATASOURCE_USERNAME:superchat}
    password: ${SPRING_DATASOURCE_PASSWORD:superchat123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/superchat/protocol/openid-connect/certs}
  threads:
    virtual:
      enabled: true

internal:
  api:
    token: ${INTERNAL_API_TOKEN:internal-secret}

user:
  service:
    url: ${USER_SERVICE_URL:http://user-service:8083}

server:
  port: ${SERVER_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
