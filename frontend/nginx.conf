server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # Presence polling — suppress access log (called every ~10s by the frontend)
  location = /api/chat/presence {
    access_log off;
    resolver 127.0.0.11 ipv6=off;
    set $gw_upstream http://api-gateway:8090;
    proxy_pass $gw_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Authorization;
  }

  # All API calls routed to API Gateway
  location /api/ {
    resolver 127.0.0.11 ipv6=off;
    set $gw_upstream http://api-gateway:8090;
    proxy_pass $gw_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Authorization;
  }

  # Keycloak token endpoint (strip /kc prefix)
  location /kc/ {
    resolver 127.0.0.11 ipv6=off;
    set $kc_upstream http://keycloak:8080;
    rewrite ^/kc/(.*)$ /$1 break;
    proxy_pass $kc_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # WebSocket (direct to chat-service, bypassing API Gateway)
  location /ws {
    resolver 127.0.0.11 ipv6=off;
    set $ws_upstream http://chat-service:8082;
    proxy_pass $ws_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
