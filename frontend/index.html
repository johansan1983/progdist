<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <section class="panel panel-auth" id="authPanel">
        <h1>SuperChat</h1>
        <p class="subtitle">Plataforma corporativa de mensajería</p>
        <form id="loginForm" class="stack">
          <label>
            Usuario
            <input id="phone" type="text" placeholder="alice" autocomplete="username" required />
          </label>
          <label>
            Contraseña
            <input id="password" type="password" placeholder="••••••••" required />
          </label>
          <button type="submit">Entrar</button>
        </form>
        <p id="authError" class="error"></p>
      </section>

      <section class="panel panel-chat hidden" id="chatPanel">
        <header class="chat-header">
          <div class="chat-header-left">
            <button id="sidebarToggle" type="button" class="btn-icon sidebar-toggle-btn" aria-label="Conversaciones" aria-expanded="false">☰</button>
            <div>
              <h2 id="chatTitle">Chat General</h2>
              <p id="sessionInfo"></p>
            </div>
          </div>
          <div class="chat-actions">
            <div class="status-row">
              <span id="socketDot" class="dot offline"></span>
              <span id="socketText">desconectado</span>
            </div>
            <button id="logoutBtn" type="button" class="btn-ghost">Cerrar sesión</button>
          </div>
        </header>

        <div class="chat-layout">
          <div id="sidebarBackdrop" class="sidebar-backdrop"></div>
          <aside class="conv-sidebar" aria-label="Conversaciones">
            <div class="conv-sidebar-header">
              <h3>Conversaciones</h3>
              <button id="newDmBtn" type="button" class="btn-ghost btn-sm">+ DM</button>
            </div>
            <ul id="convList" class="conv-list"></ul>
          </aside>

          <section class="chat-main">
            <div class="load-more-container">
              <button id="loadMoreBtn" type="button" class="btn-secondary hidden">Cargar más mensajes</button>
              <span id="loadMoreStatus" class="load-status"></span>
            </div>

            <div id="messages" class="messages"></div>
            <div id="typingIndicator" class="typing-indicator hidden" aria-live="polite"></div>

            <form id="messageForm" class="composer">
              <input type="file" id="fileInput" class="hidden" accept="image/*,audio/*,*/*" />
              <button type="button" id="attachBtn" class="btn-icon" title="Adjuntar archivo">📎</button>
              <button type="button" id="emojiBtn" class="btn-icon" title="Emojis">😊</button>
              <button type="button" id="viewOnceBtn" class="btn-icon" title="Ver una vez" aria-label="Ver una vez" aria-pressed="false">🔥</button>
              <button type="button" id="voiceBtn" class="btn-icon" title="Mensaje de voz" aria-label="Grabar mensaje de voz" aria-pressed="false">🎤</button>
              <div id="emojiPicker" class="emoji-picker-container hidden"></div>
              <div id="attachmentPreview" class="attachment-preview hidden"></div>
              <textarea id="messageInput" placeholder="Escribe un mensaje..." maxlength="2000" rows="1" spellcheck="true" lang="es"></textarea>
              <button type="submit" id="sendBtn">Enviar</button>
            </form>
          </section>

          <aside class="chat-side" aria-label="Usuarios conectados">
            <h3>Conectados</h3>
            <p id="presenceCount" class="presence-count">0 usuarios</p>
            <ul id="presenceList" class="presence-list"></ul>
          </aside>
        </div>
      </section>
    </main>

    <!-- Image lightbox -->
    <div id="imgLightbox" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Imagen">
      <img id="imgLightboxImg" src="" alt="" class="lightbox-img" />
    </div>

    <!-- DM modal -->
    <div id="dmModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Nuevo mensaje directo">
      <div class="modal-box">
        <h3>Nuevo mensaje directo</h3>
        <input id="dmSearch" type="text" placeholder="Buscar usuario..." class="dm-search-input" aria-label="Buscar usuario" />
        <ul id="dmUserList" class="dm-user-list"></ul>
        <button id="closeDmModal" type="button" class="btn-ghost">Cancelar</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5/dist/browser.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
