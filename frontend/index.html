<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperChat MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <section class="panel panel-auth" id="authPanel">
        <h1>SuperChat</h1>
        <p class="subtitle">MVP microservicios en tiempo real</p>
        <form id="loginForm" class="stack">
          <label>
            Usuario o teléfono
            <input id="phone" type="text" placeholder="demo o +34123456789" autocomplete="username" required />
          </label>
          <label>
            Alias (mostrar)
            <input id="alias" type="text" placeholder="Alice" />
          </label>
          <label>
            Password
            <input id="password" type="password" placeholder="demo" required />
          </label>
          <button type="submit">Entrar</button>
        </form>
        <p id="authError" class="error"></p>
      </section>

      <section class="panel panel-chat hidden" id="chatPanel">
        <header class="chat-header">
          <div>
            <h2>Chat General</h2>
            <p id="sessionInfo"></p>
          </div>
          <div class="chat-actions">
            <div class="status-row">
              <span id="socketDot" class="dot offline"></span>
              <span id="socketText">desconectado</span>
            </div>
            <button id="logoutBtn" type="button" class="btn-ghost">Cerrar sesion</button>
          </div>
        </header>

        <div class="chat-layout">
          <section class="chat-main">
            <section class="sim-panel" aria-label="Simulacion RabbitMQ">
              <div class="sim-title">Simulacion de falla</div>
              <div class="sim-actions">
                <button id="simulateFailBtn" type="button" class="btn-ghost">Fallar publicador</button>
                <button id="simulateRestoreBtn" type="button" class="btn-ghost">Restablecer publicador</button>
              </div>
              <p id="simulationStatus" class="sim-status">Estado publicador: desconocido</p>
            </section>

            <div class="load-more-container">
              <button id="loadMoreBtn" type="button" class="btn-secondary hidden">Cargar mas mensajes</button>
              <span id="loadMoreStatus" class="load-status"></span>
            </div>

            <div id="messages" class="messages"></div>
            <div id="typingIndicator" class="typing-indicator hidden" aria-live="polite"></div>

            <form id="messageForm" class="composer">
              <input id="messageInput" type="text" placeholder="Escribe un mensaje..." maxlength="1000" required />
              <button type="submit">Enviar</button>
            </form>
          </section>

          <aside class="chat-side" aria-label="Usuarios conectados">
            <h3>Conectados</h3>
            <p id="presenceCount" class="presence-count">0 usuarios</p>
            <ul id="presenceList" class="presence-list"></ul>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
